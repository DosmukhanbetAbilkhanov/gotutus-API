<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Meet Up &amp; Enjoy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#700df2",
                        "background-light": "#f7f5f8",
                        "background-dark": "#181022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .ios-shadow {
            box-shadow: 0 4px 20px -2px rgba(112, 13, 242, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#141118] selection:bg-primary/30">
<!-- Main Container (iPhone Form Factor) -->
<div class="relative flex min-h-screen w-full flex-col bg-white dark:bg-background-dark max-w-md mx-auto overflow-hidden">
<!-- Top App Bar / Status Area -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 justify-between">
<button aria-label="Go back" class="text-primary flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[28px]">arrow_back_ios_new</span>
</button>
<div class="flex-1"></div>
<button class="text-primary font-semibold px-4 py-2 hover:bg-primary/5 rounded-full transition-colors">
                Skip
            </button>
</div>
<!-- Hero Illustration Section -->
<div class="flex-1 flex flex-col items-center justify-center px-6">
<div class="relative w-full aspect-square max-w-[320px] mb-8">
<!-- Illustration Placeholder using styled divs to represent the scene -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl opacity-50"></div>
<div class="relative w-full h-full bg-gradient-to-br from-primary/10 to-primary/5 rounded-xl flex items-center justify-center overflow-hidden border border-primary/10" data-alt="Smartphone showing match notification and two people walking" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCIfslJNGoY5hVIe1aYBjDJbIp7xArMgTCmVLSCWw8jKrMAtJ96d7D3ricYScFBl9PVlc2tn9wn_5pOmbF-E78vjNNCIg7CXIxqQEq8JCwUVVbTqrsYeZv57fEeNW93-AUT89FTPPnOW22hpH4hXPqJ1TbzIe6IPy_f7yxX7RBrIJUMa9cylAlw0HAQ5i10WtrFZ1o5uX9_M0d7lyubKZuKjSnpr1IricufopXYDjQz4OGUhYBZf9oYMKpE9z2jOfvib3KBkvgkMfE"); background-size: cover; background-position: center;'>
<!-- Floating Notification Mockup -->
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[80%] bg-white/90 backdrop-blur-md p-4 rounded-xl ios-shadow border border-white/50 flex items-center gap-3">
<div class="size-10 rounded-full bg-primary flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-white">favorite</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] font-bold text-primary uppercase tracking-wider leading-none mb-1">New Match!</span>
<span class="text-xs font-semibold text-[#141118]">Ready for a coffee walk?</span>
</div>
</div>
<!-- Overlay Gradient -->
<div class="absolute inset-0 bg-gradient-to-t from-white/40 to-transparent"></div>
</div>
</div>
<!-- Progress Indicator (Variant 3 of 3) -->
<div class="flex w-full flex-row items-center justify-center gap-2 mb-8">
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-10 rounded-full bg-primary"></div>
</div>
<!-- Text Content -->
<div class="text-center">
<h1 class="text-[#141118] dark:text-white tracking-tight text-[32px] font-extrabold leading-tight px-4 pb-3">
                    Meet Up &amp; Enjoy
                </h1>
<p class="text-[#5e536b] dark:text-[#a094b0] text-base font-medium leading-relaxed px-8">
                    Connect safely, decide on a spot, and enjoy real-life interactions with people in your city.
                </p>
</div>
</div>
<!-- Footer Action Area -->
<div class="p-6 pb-12 flex flex-col gap-4">
<button class="w-full bg-primary text-white text-lg font-bold py-5 rounded-full shadow-lg shadow-primary/30 hover:bg-primary/90 active:scale-95 transition-all">
                Get Started
            </button>
<p class="text-center text-xs text-[#8d839a] font-medium">
                By tapping "Get Started", you agree to our <a class="text-primary underline" href="#">Terms of Service</a>.
            </p>
</div>
<!-- Home Indicator (iOS Style) -->
<div class="flex justify-center pb-2">
<div class="h-1.5 w-32 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
</div>
</div>
</body></html>

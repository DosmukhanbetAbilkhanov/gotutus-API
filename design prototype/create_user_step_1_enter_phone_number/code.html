<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registration - Phone Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4F46E5", // Electric Indigo
                        "secondary": "#06B6D4", // Subtle Cyan Accent
                        "background-light": "#F9FAFB",
                        "background-dark": "#0F172A",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Plus Jakarta Sans', sans-serif;
                min-height: 100dvh;
            }
            input::-webkit-outer-spin-button,
            input::-webkit-inner-spin-button {
                -webkit-appearance: none;
                margin: 0;
            }
            input[type=number] {
                -moz-appearance: textfield;
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex justify-center">
<div class="relative w-full max-w-[430px] min-h-screen bg-white dark:bg-slate-900 flex flex-col shadow-2xl overflow-hidden">
<div class="flex items-center bg-white dark:bg-slate-900 px-4 pt-12 pb-4">
<button class="text-slate-900 dark:text-white flex size-10 items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
</div>
<div class="flex-1 px-8 pt-6 flex flex-col">
<h1 class="text-slate-900 dark:text-white tracking-tight text-3xl font-extrabold leading-tight mb-3">
                Enter your phone number
            </h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-medium leading-relaxed mb-10">
                We'll send you a verification code to get you started with local hangouts.
            </p>
<div class="flex items-center gap-3 bg-slate-50 dark:bg-slate-800/50 p-1 rounded-2xl border-2 border-slate-100 dark:border-slate-800 focus-within:border-primary dark:focus-within:border-primary transition-all">
<div class="flex items-center gap-2 px-4 py-3 border-r border-slate-200 dark:border-slate-700 cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700 rounded-l-xl transition-colors">
<span class="text-2xl">🇺🇸</span>
<span class="text-slate-900 dark:text-white font-bold text-lg">+1</span>
<span class="material-symbols-outlined text-slate-400 text-sm">expand_more</span>
</div>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-xl font-bold text-slate-900 dark:text-white placeholder:text-slate-300 dark:placeholder:text-slate-600 py-4" placeholder="000-000-0000" type="tel"/>
</div>
<p class="mt-4 text-slate-400 dark:text-slate-500 text-xs font-medium px-1">
                By continuing, you may receive an SMS for verification. Message and data rates may apply.
            </p>
<div class="mt-auto pb-10">
<button class="w-full bg-primary hover:bg-indigo-700 text-white text-lg font-bold py-5 rounded-full shadow-lg shadow-primary/25 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Next
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
<div class="bg-slate-100 dark:bg-slate-800/50 p-2 grid grid-cols-3 gap-1">
<button class="h-14 flex items-center justify-center text-2xl font-semibold rounded-lg bg-white dark:bg-slate-800 shadow-sm active:bg-slate-200 dark:active:bg-slate-700 transition-colors text-slate-900 dark:text-white">1</button>
<button class="h-14 flex items-center justify-center text-2xl font-semibold rounded-lg bg-white dark:bg-slate-800 shadow-sm active:bg-slate-200 dark:active:bg-slate-700 transition-colors text-slate-900 dark:text-white">2</button>
<button class="h-14 flex items-center justify-center text-2xl font-semibold rounded-lg bg-white dark:bg-slate-800 shadow-sm active:bg-slate-200 dark:active:bg-slate-700 transition-colors text-slate-900 dark:text-white">3</button>
<button class="h-14 flex items-center justify-center text-2xl font-semibold rounded-lg bg-white dark:bg-slate-800 shadow-sm active:bg-slate-200 dark:active:bg-slate-700 transition-colors text-slate-900 dark:text-white">4</button>
<button class="h-14 flex items-center justify-center text-2xl font-semibold rounded-lg bg-white dark:bg-slate-800 shadow-sm active:bg-slate-200 dark:active:bg-slate-700 transition-colors text-slate-900 dark:text-white">5</button>
<button class="h-14 flex items-center justify-center text-2xl font-semibold rounded-lg bg-white dark:bg-slate-800 shadow-sm active:bg-slate-200 dark:active:bg-slate-700 transition-colors text-slate-900 dark:text-white">6</button>
<button class="h-14 flex items-center justify-center text-2xl font-semibold rounded-lg bg-white dark:bg-slate-800 shadow-sm active:bg-slate-200 dark:active:bg-slate-700 transition-colors text-slate-900 dark:text-white">7</button>
<button class="h-14 flex items-center justify-center text-2xl font-semibold rounded-lg bg-white dark:bg-slate-800 shadow-sm active:bg-slate-200 dark:active:bg-slate-700 transition-colors text-slate-900 dark:text-white">8</button>
<button class="h-14 flex items-center justify-center text-2xl font-semibold rounded-lg bg-white dark:bg-slate-800 shadow-sm active:bg-slate-200 dark:active:bg-slate-700 transition-colors text-slate-900 dark:text-white">9</button>
<div class="h-14"></div>
<button class="h-14 flex items-center justify-center text-2xl font-semibold rounded-lg bg-white dark:bg-slate-800 shadow-sm active:bg-slate-200 dark:active:bg-slate-700 transition-colors text-slate-900 dark:text-white">0</button>
<button class="h-14 flex items-center justify-center text-2xl font-semibold rounded-lg bg-transparent active:bg-slate-200/50 dark:active:bg-slate-700/50 transition-colors">
<span class="material-symbols-outlined text-slate-400">backspace</span>
</button>
<div class="col-span-3 h-6 flex justify-center items-end pb-2">
<div class="w-32 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</div>
</div>

</body></html>
